<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美区各大区劳务付款汇总看板</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, "Microsoft YaHei", "Segoe UI", sans-serif;
  background: #f4f6f9;
  color: #1a1a2e;
  min-width: 900px;
}
.header {
  padding: 20px 30px;
  background: linear-gradient(135deg, #f8fafc 0%, #fff 100%);
  border-bottom: 1px solid #e2e8f0;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.header h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; text-align: center; }
.header .update-time { color: #94a3b8; font-size: 13px; }

.filter-bar {
  padding: 14px 30px;
  background: #fff;
  display: flex;
  gap: 8px;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  border-bottom: 1px solid #e2e8f0;
  position: relative;
}
.filter-bar label { color: #64748b; font-size: 13px; font-weight: 500; }
.period-wrap {
  position: absolute;
  right: 30px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  align-items: center;
  gap: 6px;
}

.region-btn {
  padding: 8px 16px;
  border: 1px solid #E8ECF1;
  border-left: 5px solid transparent;
  border-radius: 6px;
  background: #fff;
  color: #333;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s ease;
  outline: none;
  white-space: nowrap;
}
/* Inactive: white bg + colored left bar */
.region-btn.all-btn                         { border-left-color: #6C7A89; }
.region-btn[data-region="MS中南大区"]       { border-left-color: #C0392B; }
.region-btn[data-region="WE美西大区"]       { border-left-color: #2980B9; }
.region-btn[data-region="TX德州大区"]       { border-left-color: #D35400; }
.region-btn[data-region="NE东北大区"]       { border-left-color: #27AE60; }
.region-btn[data-region="GL大湖大区"]       { border-left-color: #8E44AD; }
.region-btn[data-region="Ground项目部"]     { border-left-color: #1ABC9C; }
.region-btn[data-region="FL佛州大区"]       { border-left-color: #E91E63; }
.region-btn[data-region="PR波多黎各区"]     { border-left-color: #00897B; }

/* Hover (inactive): subtle bg shift */
.region-btn:hover:not(.active) { background: #f4f6f9; }

/* Active: solid accent bg + white bold text */
.region-btn.all-btn.active                         { background: #6C7A89; color: #fff; font-weight: 700; border: 1px solid #5D6D7E; }
.region-btn[data-region="MS中南大区"].active       { background: #C0392B; color: #fff; font-weight: 700; border: 1px solid #A93226; }
.region-btn[data-region="WE美西大区"].active       { background: #2980B9; color: #fff; font-weight: 700; border: 1px solid #1F6F8B; }
.region-btn[data-region="TX德州大区"].active       { background: #D35400; color: #fff; font-weight: 700; border: 1px solid #A04000; }
.region-btn[data-region="NE东北大区"].active       { background: #27AE60; color: #fff; font-weight: 700; border: 1px solid #1E8449; }
.region-btn[data-region="GL大湖大区"].active       { background: #8E44AD; color: #fff; font-weight: 700; border: 1px solid #6C3483; }
.region-btn[data-region="Ground项目部"].active     { background: #1ABC9C; color: #fff; font-weight: 700; border: 1px solid #16A085; }
.region-btn[data-region="FL佛州大区"].active       { background: #E91E63; color: #fff; font-weight: 700; border: 1px solid #C2185B; }
.region-btn[data-region="PR波多黎各区"].active     { background: #00897B; color: #fff; font-weight: 700; border: 1px solid #00695C; }

.period-select {
  padding: 6px 12px;
  border: 1px solid #cbd5e1;
  border-radius: 6px;
  background: #fff;
  color: #334155;
  font-size: 13px;
  margin-left: auto;
}

.kpi-row { display:flex; gap:14px; padding:16px 30px; flex-wrap:wrap; justify-content:center; }
.kpi-card {
  flex:1; min-width:180px;
  background:#fff;
  border-radius:10px;
  padding:18px 22px;
  border:1px solid #e2e8f0;
  position:relative;
  overflow:hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  transition: box-shadow 0.2s, transform 0.15s;
}
.kpi-card:hover { box-shadow: 0 6px 16px rgba(0,0,0,0.08); transform: translateY(-1px); }
.kpi-label { font-size:12px; color:#000000; margin-bottom:8px; font-weight:500; letter-spacing:0.3px; }
.kpi-value { font-size:26px; font-weight:700; color:#000000; }
.kpi-mom { font-size:12px; margin-top:8px; font-weight:500; }
.kpi-mom.up { color:#2ECC71; }
.kpi-mom.down { color:#E74C3C; }
.info-bar {
  background: #f5f7fa;
  border-radius: 10px;
  padding: 10px 20px;
  margin: 0 30px 16px;
  font-size: 14px;
  color: #333;
  display: flex;
  align-items: center;
  justify-content: space-around;
  flex-wrap: wrap;
  gap: 8px 16px;
  border: 1px solid #e2e8f0;
}
.info-bar .info-period { font-weight: 700; color: #2980B9; white-space: nowrap; }
.info-bar .info-sep { color: #ccc; }
.info-bar .info-val { font-weight: 600; color: #1a1a2e; }

.charts-grid {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:18px;
  padding:0 30px 20px;
}
.chart-card {
  background:#fff;
  border-radius:10px;
  padding:18px;
  border:1px solid #e2e8f0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  transition: box-shadow 0.2s;
}
.chart-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.07); }
.chart-card.full-width { grid-column:1/-1; }
.chart-card h3 { font-size:16px; font-weight:600; margin-bottom:14px; color:#1e293b; }
.chart-wrap { position:relative; height:360px; }
.chart-wrap.tall { height:400px; padding-top:24px; }
/* Left-right layout for region compare */
.region-compare-row { display:flex; gap:16px; align-items:stretch; }
.region-compare-left { flex:0 0 40%; min-width:0; display:flex; flex-direction:column; }
.region-compare-left .chart-wrap { flex:1; min-height:500px; }
.region-compare-mid {
  flex:0 0 25%; min-width:0;
  background:#f8fafc;
  border-radius:10px;
  border:1px solid #e2e8f0;
  padding:16px 18px;
  display:flex; flex-direction:column; justify-content:center;
}
.region-compare-mid h4 {
  font-size:13px; font-weight:600; color:#64748b;
  margin-bottom:12px; padding-bottom:8px;
  border-bottom:1px solid #e2e8f0;
}
.region-compare-right {
  flex:0 0 50%; min-width:0;
  display:flex; flex-direction:column;
}
.region-compare-right h4 { flex:0 0 auto; }
.region-compare-right .chart-wrap { flex:1; min-height:0; }
.region-chart-title {
  font-size:13px; font-weight:600; color:#64748b;
  margin-bottom:8px; padding-bottom:6px;
  text-align:center;
}
.summary-item {
  display:flex; justify-content:space-between; align-items:center;
  padding:6px 0; font-size:12px; color:#64748b;
  border-bottom:1px solid #f1f5f9;
}
.summary-item:last-child { border-bottom:none; }
.summary-item .s-label { white-space:nowrap; margin-right:8px; }
.summary-item .s-value { font-weight:600; color:#1a1a2e; text-align:right; white-space:nowrap; }

.table-section { padding:0 30px 20px; }
.table-card {
  background:#fff;
  border-radius:10px;
  padding:20px;
  border:1px solid #e2e8f0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.table-card h3 { font-size:15px; font-weight:600; margin-bottom:14px; color:#334155; }
.export-btn {
  padding:7px 18px;
  background:#3498DB;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
  font-weight:500;
  float:right;
  margin-bottom:12px;
  transition: background 0.2s;
}
.export-btn:hover { background:#2980B9; }
.table-wrap { overflow-x:auto; max-height:420px; overflow-y:auto; clear:both; border-radius:8px; }
table { width:100%; table-layout:fixed; border-collapse:collapse; font-size:13px; }
th {
  background:#f1f5f9;
  color:#000000;
  padding:10px 14px;
  text-align:center;
  position:sticky; top:0; z-index:1;
  border-bottom:2px solid #cbd5e1;
  font-weight:600;
  white-space:nowrap;
  font-size:12px;
  letter-spacing:0.3px;
}
td { padding:9px 14px; border-bottom:1px solid #f1f5f9; color:#000000; text-align:center; }
tr:nth-child(even) td { background:#fafbfc; }
tr:hover td { background:#eef2f7; }
th:nth-child(1), td:nth-child(1) { width:100px; }
th:nth-child(2), td:nth-child(2) { width:120px; }
.all-view th:nth-child(3), .all-view td:nth-child(3) { width:80px; }
.region-view th:nth-child(3), .region-view td:nth-child(3) { width:180px; }
th:nth-child(4), td:nth-child(4) { width:130px; }
th:nth-child(5), td:nth-child(5) { width:100px; }
th:nth-child(6), td:nth-child(6) { width:100px; }
.text-right { text-align:right; }
.hidden { display:none!important; }

@media (max-width:1100px) {
  .charts-grid { grid-template-columns:1fr; }
}

/* Login overlay */
.login-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  display: flex; align-items: center; justify-content: center;
}
.login-box {
  background: #fff; border-radius: 16px; padding: 40px 36px;
  width: 400px; max-width: 92vw; box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  text-align: center;
}
.login-box h2 { font-size: 22px; color: #1a1a2e; margin-bottom: 6px; }
.login-sub { font-size: 14px; color: #94a3b8; margin-bottom: 28px; }
.login-btn-feishu {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, #3370ff 0%, #245bdb 100%);
  color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; margin-bottom: 16px;
}
.login-btn-feishu:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(51,112,255,0.4); }
.login-btn-feishu:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.login-feishu-icon { width: 24px; height: 24px; }
.login-error { color: #E74C3C; font-size: 13px; margin-top: 12px; min-height: 20px; }
.login-loading { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.login-link-wrap { text-decoration: none; display: block; }
.login-link-wrap:hover { text-decoration: none; }

/* User bar */
.user-bar {
  display: flex; align-items: center; justify-content: flex-end; gap: 12px;
  padding: 8px 30px; background: #fff; border-bottom: 1px solid #e2e8f0;
  font-size: 13px; color: #64748b;
}
.user-bar .user-name { font-weight: 600; color: #334155; }
.user-bar .user-role { color: #94a3b8; }
.logout-btn {
  padding: 4px 14px; background: #ef4444; color: #fff;
  border: none; border-radius: 6px; font-size: 12px; cursor: pointer;
  transition: opacity 0.2s;
}
.logout-btn:hover { opacity: 0.85; }
</style>
</head>
<body>

<!-- Login overlay -->
<div id="loginOverlay" class="login-overlay">

        <svg class="login-feishu-icon" viewBox="0 0 24 24" fill="white"><rect x="2" y="2" width="20" height="20" rx="4"/><text x="12" y="17" text-anchor="middle" font-size="14" font-weight="bold" fill="#3370ff">L</text></svg>

<!-- Main app -->
<div id="appContent" style="display:none;">

    <button class="logout-btn" id="adminBtn" style="display:none;margin-right:8px;background:#ff9800;color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;" onclick="window.open('/admin.html','_blank')">⚙️ 权限管理</button>
    <button class="logout-btn" onclick="handleLogout()">退出登录</button>
  </div>
  <div class="header">
    <h1>美区各大区劳务付款汇总看板</h1>
    <span class="update-time" id="updateTime"></span>
  </div>
  <div class="filter-bar">
    <label>大区：</label>
    <div id="regionBtns" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
    <span class="period-wrap">
      <label>周期：</label>
      <select class="period-select" id="periodFilter" onchange="refreshAll()"><option value="all">全部</option></select>
    </span>

      <h3>📈 月度总工时&付款总额趋势</h3>

    </div>

      <h3 id="titleRegionCompare">大区对比</h3>

        <div class="region-compare-left">
          <h4 class="region-chart-title" id="chartTitlePay">各大区付款金额（USD）</h4>
          <div class="chart-wrap"><canvas id="chartRegionComparePay"></canvas></div>
        </div>
        <div class="region-compare-right" id="regionCompareHours">
          <h4 class="region-chart-title" id="chartTitleHours">各大区总工时（h）</h4>
          <div class="chart-wrap"><canvas id="chartRegionCompareHours"></canvas></div>
        </div>
        <div class="region-compare-mid" id="regionCompareSummary" style="display:none;">
          <h4>数据摘要</h4>
          <div id="summaryContent"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="table-section">
    <div class="table-card">
      <button class="export-btn" onclick="exportCSV()">📥 导出 CSV</button>
      <h3>📋 劳务周期付款明细表</h3>
      <div class="table-wrap">
        <table id="detailTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="/lib/chart.umd.min.js"></script>
<script src="/lib/chartjs-plugin-datalabels.min.js"></script>
<script src="/lib/data.js"></script>
<script>
// Register chartjs-plugin-datalabels globally
Chart.register(ChartDataLabels);

// ==================== CONFIG ====================
const API_BASE = window.location.origin;
const EXCHANGE_RATE = 6.79;
const EXCHANGE_DATE = '2026-06-25';

const REGION_COLORS = {
  "all": "#E67E22",
  "MS中南大区": "#E74C3C",
  "WE美西大区": "#3498DB",
  "TX德州大区": "#F39C12",
  "NE东北大区": "#2ECC71",
  "GL大湖大区": "#9B59B6",
  "Ground项目部": "#1ABC9C",
  "FL佛州大区": "#E91E63",
  "PR波多黎各区": "#00897B"
};
const REGION_NAMES = ["MS中南大区", "TX德州大区", "NE东北大区", "WE美西大区", "GL大湖大区", "FL佛州大区", "Ground项目部", "PR波多黎各区"];

// ==================== STATE ====================
let USER = null;
let PERIODS = [];
let RECORDS = [];
let currentRegion = 'all';
let currentPeriod = 'all';
let charts = {};

// ==================== FEISHU SSO AUTH ====================
function handleLogin() {
  console.log('[BP Dashboard] handleLogin triggered');
  var redirectUrl = API_BASE.replace(/\/+$/, '') + '/api/auth/feishu';
  var btn = document.getElementById('loginBtn');
  var errEl = document.getElementById('loginError');
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<span class="login-loading"></span>跳转中...';
  }
  if (errEl) errEl.textContent = '';
  window.location.href = redirectUrl;
  setTimeout(function() {
    window.location.replace(redirectUrl);
  }, 300);
}

function handleLogout() {
  localStorage.removeItem('bp_jwt_token');
  document.cookie = 'bp_jwt_token=; Path=/; SameSite=Lax; Max-Age=0';
  window.location.reload();
}

async function verifyToken(token) {
  try {
    var url = API_BASE.replace(/\/+$/, '') + '/api/auth/me';
    const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
    if (!res.ok) return null;
    const data = await res.json();
    return data.authenticated ? data.user : null;
  } catch (e) {
    console.error('[BP Dashboard] verifyToken exception:', e.message);
    return null;
  }
}

// ==================== INIT ====================
window.addEventListener('DOMContentLoaded', async function() {
  var loginBtn = document.getElementById('loginBtn');
  if (loginBtn) loginBtn.addEventListener('click', handleLogin);

  function getCookie(name) {
    var m = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
    return m ? decodeURIComponent(m[1]) : null;
  }

  var token = getCookie('bp_jwt_token');
  if (!token) token = localStorage.getItem('bp_jwt_token');

  if (!token) {
    var hash = window.location.hash;
    if (hash && hash.indexOf('token=') !== -1) {
      var m2 = hash.match(/token=([^&]+)/);
      if (m2) { token = m2[1]; history.replaceState(null, '', window.location.pathname); }
    }
  }

  if (token) {
    var user = await verifyToken(token);
    if (user) {
      USER = user;
      localStorage.setItem('bp_jwt_token', token);
      document.cookie = 'bp_jwt_token=' + token + '; Path=/; SameSite=Lax; Max-Age=604800';
      showDashboard();
    } else {
      localStorage.removeItem('bp_jwt_token');
      showLogin();
    }
  } else {
    showLogin();
  }
});

function showLogin() {
  document.getElementById('loginOverlay').style.display = '';
  document.getElementById('appContent').style.display = 'none';
}

function showDashboard() {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('appContent').style.display = '';
  document.getElementById('userName').textContent = USER.name || USER.open_id;
  document.getElementById('userRole').textContent = USER.role === 'admin' ? '管理员' : (USER.role === 'region_bp' ? '区域BP' : '游客');
  if (USER.role === 'admin') {
    document.getElementById('adminBtn').style.display = '';
  }
  renderRegionButtons();
  loadData();
}

function renderRegionButtons() {
  const container = document.getElementById('regionBtns');
  container.innerHTML = '';
  const allowedRegions = USER.role === 'admin' ? ['all'].concat(REGION_NAMES) : ['all'].concat(USER.regions || []);
  allowedRegions.forEach(function(region) {
    const btn = document.createElement('button');
    btn.className = 'region-btn' + (region === 'all' ? ' all-btn' : '');
    btn.dataset.region = region;
    btn.textContent = region === 'all' ? '全部' : region;
    btn.onclick = function() { selectRegion(region); };
    if (region === 'all') btn.classList.add('active');
    container.appendChild(btn);
  });
}

// ==================== DATA LOADING ====================
function loadData() {
  // Use embedded template data (882 records, matches dashboard template exactly)
  RECORDS = (typeof TEMPLATE_RECORDS !== 'undefined') ? TEMPLATE_RECORDS : [];

  var periodsSet = {};
  RECORDS.forEach(function(r) { periodsSet[r.period] = true; });
  PERIODS = Object.keys(periodsSet).sort();

  var sel = document.getElementById('periodFilter');
  while (sel.options.length > 1) sel.remove(1);
  PERIODS.forEach(function(p) {
    var opt = document.createElement('option');
    opt.value = p; opt.textContent = p; sel.appendChild(opt);
  });

  currentRegion = 'all';
  refreshAll();
}

// ==================== HELPERS ====================
function fmtLabel(v) {
  if (v === null || v === undefined) return '';
  var n = Number(v);
  if (n >= 10000) return (n/10000).toFixed(1) + '万';
  return n.toLocaleString('en-US', {maximumFractionDigits:0});
}
function fmtMoney(v) {
  if (Math.abs(v) >= 10000) return '$' + (v / 10000).toFixed(1) + '万';
  return '$' + v.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
}
function fmtHours(v) {
  if (Math.abs(v) >= 10000) return (v / 10000).toFixed(1) + '万';
  return v.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
}
function fmtCNY(v) {
  if (Math.abs(v) >= 10000) return '¥' + (v / 10000).toFixed(1) + '万';
  return '¥' + v.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
}
function getCtx(id) {
  var el = document.getElementById(id);
  if (!el) { console.error('Canvas not found:', id); return null; }
  return el.getContext('2d');
}
function destroyChart(key) {
  if (charts[key]) { charts[key].destroy(); delete charts[key]; }
}

// ==================== KPI ====================
function computeKPI(records) {
  var vendors = {};
  var payment = 0, hours = 0;
  records.forEach(function(r) { vendors[r.vendor] = true; payment += r.payment; hours += r.hours; });
  var vlen = Object.keys(vendors).length;
  return {
    companies: vlen,
    payment: Math.round(payment*100)/100,
    hours: Math.round(hours*100)/100,
    avgCost: vlen ? Math.round(payment/vlen*100)/100 : 0,
    avgHours: vlen ? Math.round(hours/vlen*100)/100 : 0
  };
}

function renderKPI() {
  var recs = RECORDS;
  if (currentPeriod !== 'all') recs = recs.filter(function(r) { return r.period === currentPeriod; });
  if (currentRegion !== 'all') recs = recs.filter(function(r) { return r.region === currentRegion; });

  var kr = computeKPI(recs);
  var latestPeriod = PERIODS[PERIODS.length - 1];
  var latestRecs = RECORDS;
  if (currentRegion !== 'all') latestRecs = latestRecs.filter(function(r) { return r.region === currentRegion; });
  latestRecs = latestRecs.filter(function(r) { return r.period === latestPeriod; });
  var latestKPI = computeKPI(latestRecs);

  // MoM: only calculate when a specific period is selected
  var momPayment = null, momHours = null, momAvgCost = null, momAvgHours = null, momCompanies = null;
  var showMom = currentPeriod !== 'all';
  if (showMom) {
    var idx = PERIODS.indexOf(currentPeriod);
    if (idx > 0) {
      var prevPeriod = PERIODS[idx - 1];
      var curRecs = RECORDS.filter(function(r) { return r.period === currentPeriod; });
      var preRecs = RECORDS.filter(function(r) { return r.period === prevPeriod; });
      if (currentRegion !== 'all') {
        curRecs = curRecs.filter(function(r) { return r.region === currentRegion; });
        preRecs = preRecs.filter(function(r) { return r.region === currentRegion; });
      }
      var curP = curRecs.reduce(function(s,r) { return s+r.payment; }, 0);
      var preP = preRecs.reduce(function(s,r) { return s+r.payment; }, 0);
      var curH = curRecs.reduce(function(s,r) { return s+r.hours; }, 0);
      var preH = preRecs.reduce(function(s,r) { return s+r.hours; }, 0);
      var curV = {}; curRecs.forEach(function(r) { curV[r.vendor] = true; }); curV = Object.keys(curV).length;
      var preV = {}; preRecs.forEach(function(r) { preV[r.vendor] = true; }); preV = Object.keys(preV).length;

      if (preV) momCompanies = Math.round((curV-preV)/preV*1000)/10;
      if (preP) momPayment = Math.round((curP-preP)/preP*1000)/10;
      if (preH) momHours = Math.round((curH-preH)/preH*1000)/10;
      if (preP && preV && curV) {
        var curAC = curP / curV, preAC = preP / preV;
        if (preAC) momAvgCost = Math.round((curAC-preAC)/preAC*1000)/10;
        var curAH = curH / curV, preAH = preH / preV;
        if (preAH) momAvgHours = Math.round((curAH-preAH)/preAH*1000)/10;
      }
    }
  }

  var cards = [
    { label:'合作劳务数（家）',    value: kr.companies,   fmt:'num',   showMom: showMom, mom: momCompanies },
    { label:'付款总额（USD）',     value: kr.payment,     fmt:'money', showMom: showMom, mom: momPayment },
    { label:'总工时（h）',         value: kr.hours,       fmt:'hours', showMom: showMom, mom: momHours },
    { label:'劳务平均成本（USD）', value: kr.avgCost,     fmt:'money', showMom: showMom, mom: momAvgCost },
    { label:'劳务平均工时（h）',   value: kr.avgHours,    fmt:'hours', showMom: showMom, mom: momAvgHours }
  ];

  var accentColor = REGION_COLORS[currentRegion] || '#95A5A6';
  var html = '';
  cards.forEach(function(c) {
    var display = c.value;
    if (c.fmt === 'money') display = fmtMoney(c.value);
    else if (c.fmt === 'hours') display = fmtHours(c.value);
    else if (c.fmt === 'num') display = c.value;

    var momHtml = '';
    if (c.showMom) {
      if (c.mom !== null && c.mom !== undefined) {
        var up = c.mom >= 0;
        momHtml = '<div class="kpi-mom ' + (up?'up':'down') + '">较上周期 ' + (up?'↑':'↓') + ' ' + Math.abs(c.mom) + '%</div>';
      } else {
        momHtml = '<div class="kpi-mom" style="color:#000000;">较上周期 --</div>';
      }
    }
    html += '<div class="kpi-card" style="border-left:4px solid ' + accentColor + ';"><div class="kpi-label">' + c.label + '</div><div class="kpi-value" style="color:#000000">' + display + '</div>' + momHtml + '</div>';
  });

  document.getElementById('kpiRow').innerHTML = html;
  document.getElementById('kpiRow').className = 'kpi-row';

  var infoBar = document.getElementById('infoBar');
  if (currentRegion === 'all') {
    infoBar.style.display = '';
    infoBar.innerHTML = '<span class="info-period">最新周期：' + latestPeriod + '</span><span class="info-sep">|</span>劳务数 <span class="info-val">' + latestKPI.companies + '家</span><span class="info-sep">|</span>付款总额 <span class="info-val">' + fmtMoney(latestKPI.payment) + '</span><span class="info-sep">|</span>总工时（h） <span class="info-val">' + fmtHours(latestKPI.hours) + '</span><span class="info-sep">|</span>平均成本 <span class="info-val">' + fmtMoney(latestKPI.avgCost) + '</span><span class="info-sep">|</span>平均工时（h） <span class="info-val">' + fmtHours(latestKPI.avgHours) + '</span>';
  } else {
    infoBar.style.display = 'none';
  }
}

// ==================== CHART: Monthly Trend ====================
function renderTrend() {
  destroyChart('trend');
  var ctx = getCtx('chartTrend'); if (!ctx) return;

  var payments = PERIODS.map(function(p) {
    var recs = RECORDS.filter(function(r) { return r.period === p; });
    if (currentRegion !== 'all') recs = recs.filter(function(r) { return r.region === currentRegion; });
    return Math.round(recs.reduce(function(s,r) { return s+r.payment; }, 0)*100)/100;
  });
  var hours = PERIODS.map(function(p) {
    var recs = RECORDS.filter(function(r) { return r.period === p; });
    if (currentRegion !== 'all') recs = recs.filter(function(r) { return r.region === currentRegion; });
    return Math.round(recs.reduce(function(s,r) { return s+r.hours; }, 0)*100)/100;
  });

  charts['trend'] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: PERIODS,
      datasets: [
        {
          label: '付款总额(USD)',
          data: payments,
          backgroundColor: '#2980B9',
          borderColor: '#2980B9',
          borderWidth: 2,
          yAxisID: 'y',
          order: 2,
          datalabels: {
            display: function(ctx) {
              if (!ctx.dataset.data[ctx.dataIndex]) return false;
              var n = ctx.dataset.data.length;
              if (n > 12 && ctx.dataIndex % 2 !== 0) return false;
              return true;
            },
            anchor: 'end', align: 'end', offset: 4, clamp: true,
            color: '#000000',
            font: { weight: 'bold', size: 10 },
            formatter: function(v) { return '$' + v.toLocaleString(); }
          }
        },
        {
          label: '总工时 (h)',
          data: hours,
          type: 'line',
          borderColor: '#F39C12',
          backgroundColor: '#F39C12',
          fill: false,
          yAxisID: 'y1',
          order: 1,
          tension: 0.3,
          pointBackgroundColor: '#F39C12',
          datalabels: {
            display: function(ctx) {
              if (!ctx.dataset.data[ctx.dataIndex]) return false;
              var n = ctx.dataset.data.length;
              if (n > 12 && ctx.dataIndex % 2 !== 0) return false;
              return true;
            },
            anchor: 'end', clamp: true,
            align: function(ctx) {
              if (currentRegion === 'TX德州大区' && ctx.dataIndex === 4) return 30;
              if (currentRegion === 'FL佛州大区') return 'top';
              return 45;
            },
            offset: function(ctx) {
              if (currentRegion === 'TX德州大区' && ctx.dataIndex === 4) return 20;
              if (currentRegion === 'FL佛州大区') return 8;
              return 12;
            },
            color: '#000000',
            font: { weight: 'bold', size: 10 },
            formatter: function(v) { return v.toLocaleString() + 'h'; }
          }
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { top: 24, right: 32, bottom: 4, left: 32 } },
      plugins: {
        legend: { position: 'top', labels: { usePointStyle:true, padding:16, font:{size:12}, color:'#2C3E50' } },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              var v = ctx.raw;
              if (ctx.dataset.label.includes('付款')) return ['付款总额: $' + v.toLocaleString(), '≈ ¥' + Math.round(v * EXCHANGE_RATE).toLocaleString('en-US')];
              return '总工时: ' + v.toLocaleString() + 'h';
            }
          }
        },
        datalabels: { display: false }
      },
      scales: {
        y:  { type:'linear', position:'left', title:{display:true,text:'付款金额(USD)',color:'#4A5568'}, grid:{color:'#E8ECF1'}, ticks:{color:'#4A5568'} },
        y1: { type:'linear', position:'right', title:{display:true,text:'总工时(h)',color:'#4A5568'}, grid:{drawOnChartArea:false}, ticks:{color:'#4A5568'} },
        x:  { grid:{color:'#E8ECF1'}, ticks:{font:{size:12}, color:'#4A5568'} }
      }
    }
  });
}

      document.getElementById('summaryContent').innerHTML =

        '<div class="summary-item"><span class="s-label">最低付款四级组织</span><span class="s-value">' + labels[minIdxL4] + '&nbsp;(' + fmtUsdL(minL4) + ')</span></div>' +
        '<div class="summary-item"><span class="s-label">四级组织总数</span><span class="s-value">' + labels.length + '个</span></div>' +
        '<div class="summary-item"><span class="s-label">平均付款金额</span><span class="s-value">' + fmtUsdL(avgL4) + '</span></div>' +
        '<div class="summary-item"><span class="s-label">最高组织占比</span><span class="s-value">' + maxPctL4 + '%</span></div>';
    }
  }
}

// ==================== CHART: Vendor TOP15 ====================
function renderVendorRank() {
  destroyChart('vendorRank');
  var ctx = getCtx('chartVendorRank');
  if (!ctx) return;

  var recs = RECORDS;
  if (currentRegion !== 'all') recs = recs.filter(function(r) { return r.region === currentRegion; });
  if (currentPeriod !== 'all') recs = recs.filter(function(r) { return r.period === currentPeriod; });

  var vendorMap = {};
  recs.forEach(function(r) {
    if (!vendorMap[r.vendor]) vendorMap[r.vendor] = 0;
    vendorMap[r.vendor] += r.payment;
  });
  var sorted = Object.entries(vendorMap).sort(function(a,b) { return b[1]-a[1]; }).slice(0,15);
  var labels = sorted.map(function(e) { return e[0]; });
  var data = sorted.map(function(e) { return Math.round(e[1]*100)/100; });

  var rankColors = ['#E74C3C', '#F39C12', '#F39C12', '#F1C40F', '#F1C40F'];
  var bgColors = sorted.map(function(_, i) {
    return i < rankColors.length ? rankColors[i] : '#3498DB';
  });
  var borderColors = bgColors.slice();

  var titleEl = document.getElementById('titleVendorRank');
  if (titleEl) {
    titleEl.textContent = currentRegion === 'all' ? '🏆 劳务公司费用排名 TOP15' : '劳务公司费用排名';
  }

  charts['vendorRank'] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: '付款金额(USD)',
        data: data,
        backgroundColor: bgColors,
        borderColor: borderColors,
        borderWidth: 1,
        barThickness: 18
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      indexAxis: 'y',
      layout: { padding: { right: 50, top: 5, bottom: 5 } },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: function(ctx) { return ['$' + ctx.raw.toLocaleString(), '≈ ¥' + Math.round(ctx.raw * EXCHANGE_RATE).toLocaleString('en-US')]; } } },
        datalabels: {
          display: function(ctx) {
            var n = ctx.dataset.data.length;
            if (n > 15 && ctx.dataIndex % 2 !== 0) return false;
            return 'auto';
          },
          anchor: 'end', align: 'end', offset: 4, clamp: true,
          color: '#000000',
          font: function(ctx) {
            var v = ctx.dataset.data[ctx.dataIndex];
            var total = ctx.dataset.data.reduce(function(s,d) { return s+d; }, 0);
            var pct = total ? ((v/total)*100).toFixed(1) : '0';
            var txt = '$' + v.toLocaleString('en-US',{maximumFractionDigits:0}) + ' (' + pct + '%)';
            if (txt.length > 18) return {weight:'bold', size:9};
            if (txt.length > 15) return {weight:'bold', size:10};
            return {weight:'bold', size:11};
          },
          formatter: function(v, ctx) {
            var total = ctx.dataset.data.reduce(function(s,d) { return s+d; }, 0);
            var pct = total ? ((v/total)*100).toFixed(1) : '0';
            return '$' + v.toLocaleString('en-US',{maximumFractionDigits:0}) + ' (' + pct + '%)';
          }
        }
      },
      scales: {
        x: { grid:{color:'#E8ECF1'}, title:{display:true,text:'付款金额(USD)',color:'#4A5568'}, ticks:{color:'#4A5568'} },
        y: { grid:{color:'#E8ECF1'}, ticks:{font:{size:12}, color:'#4A5568'} }
      }
    }
  });
}

// ==================== TABLE ====================
var tableSortCol = 'payment';
var tableSortAsc = false;
var tableSortActive = false;

function renderTable() {
  var recs = RECORDS;
  if (currentRegion !== 'all') recs = recs.filter(function(r) { return r.region === currentRegion; });
  if (currentPeriod !== 'all') recs = recs.filter(function(r) { return r.period === currentPeriod; });

  var rows = [];
  if (currentRegion === 'all') {
    var aggMap = {};
    recs.forEach(function(r) {
      var key = r.period + '||' + r.region;
      if (!aggMap[key]) aggMap[key] = { period: r.period, region: r.region, vendors: {}, payment: 0, hours: 0 };
      aggMap[key].vendors[r.vendor] = true;
      aggMap[key].payment += r.payment;
      aggMap[key].hours += r.hours;
    });
    Object.values(aggMap).forEach(function(d) {
      rows.push({
        period: d.period, region: d.region,
        vendorCount: Object.keys(d.vendors).length,
        payment: d.payment, hours: d.hours,
        unitCost: d.hours > 0 ? (d.payment / d.hours) : 0
      });
    });
  } else {
    var aggMap2 = {};
    recs.forEach(function(r) {
      var key = r.period + '||' + r.vendor;
      if (!aggMap2[key]) aggMap2[key] = { period: r.period, region: r.region, vendor: r.vendor, payment: 0, hours: 0 };
      aggMap2[key].payment += r.payment;
      aggMap2[key].hours += r.hours;
    });
    Object.values(aggMap2).forEach(function(d) {
      rows.push({
        period: d.period, region: d.region, vendor: d.vendor,
        payment: d.payment, hours: d.hours,
        unitCost: d.hours > 0 ? (d.payment / d.hours) : 0
      });
    });
  }

  if (tableSortActive) {
    var col = tableSortCol;
    var asc = tableSortAsc;
    rows.sort(function(a, b) {
      var va = a[col], vb = b[col];
      if (typeof va === 'string') va = va || '';
      if (typeof vb === 'string') vb = vb || '';
      var cmp = (va < vb ? -1 : va > vb ? 1 : 0);
      if (!asc) cmp = -cmp;
      if (cmp !== 0) return cmp;
      if (col === 'period') return b.payment - a.payment;
      return a.period < b.period ? -1 : 1;
    });
  } else {
    rows.sort(function(a, b) {
      if (a.period !== b.period) return a.period < b.period ? -1 : 1;
      return b.payment - a.payment;
    });
  }

  var COLS_ALL = [
    { key: 'period',      label: '周期' },
    { key: 'region',      label: '大区' },
    { key: 'vendorCount', label: '劳务公司数（家）' },
    { key: 'payment',     label: '原币付款金额(USD)' },
    { key: 'hours',       label: '总工时(h)' },
    { key: 'unitCost',    label: '单位工时成本(USD/h)' }
  ];
  var COLS_REGION = [
    { key: 'period',   label: '周期' },
    { key: 'region',   label: '大区' },
    { key: 'vendor',   label: '劳务公司' },
    { key: 'payment',  label: '原币付款金额(USD)' },
    { key: 'hours',    label: '总工时(h)' },
    { key: 'unitCost', label: '单位工时成本(USD/h)' }
  ];
  var cols = currentRegion === 'all' ? COLS_ALL : COLS_REGION;

  var headHtml = '<tr>' + cols.map(function(col) {
    var sortIcon = '';
    if (tableSortActive && col.key === tableSortCol) sortIcon = tableSortAsc ? ' ▲' : ' ▼';
    return '<th style="cursor:pointer;text-align:center;" onclick="tableSort(\'' + col.key + '\')">' + col.label + sortIcon + '</th>';
  }).join('') + '</tr>';
  document.getElementById('tableHead').innerHTML = headHtml;
  document.getElementById('detailTable').className = currentRegion === 'all' ? 'all-view' : 'region-view';

  var numFmt = function(v, dec) {
    if (dec === 2) return v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return v.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  };

  var bodyHtml = '';
  rows.forEach(function(r) {
    if (currentRegion === 'all') {
      bodyHtml += '<tr><td>' + r.period + '</td><td><span style="color:#000000;font-weight:500;">' + r.region + '</span></td><td>' + r.vendorCount + '</td><td style="font-weight:500;">$' + numFmt(r.payment, 2) + '</td><td>' + numFmt(r.hours, 2) + '</td><td>' + r.unitCost.toFixed(2) + '</td></tr>';
    } else {
      bodyHtml += '<tr><td>' + r.period + '</td><td><span style="color:#000000;font-weight:500;">' + r.region + '</span></td><td>' + (r.vendor||'') + '</td><td style="font-weight:500;">$' + numFmt(r.payment, 2) + '</td><td>' + numFmt(r.hours, 2) + '</td><td>' + r.unitCost.toFixed(2) + '</td></tr>';
    }
  });
  var colspan = cols.length;
  document.getElementById('tableBody').innerHTML = bodyHtml || '<tr><td colspan="' + colspan + '" style="text-align:center;color:#000000;padding:20px;">暂无数据</td></tr>';
}

function tableSort(col) {
  if (!tableSortActive || tableSortCol !== col) {
    tableSortActive = true;
    tableSortCol = col;
    tableSortAsc = true;
  } else if (tableSortAsc) {
    tableSortAsc = false;
  } else {
    tableSortActive = false;
  }
  renderTable();
}

// ==================== CSV EXPORT ====================
function exportCSV() {
  var recs = RECORDS;
  if (currentRegion !== 'all') recs = recs.filter(function(r) { return r.region === currentRegion; });
  if (currentPeriod !== 'all') recs = recs.filter(function(r) { return r.period === currentPeriod; });

  var BOM = '\uFEFF';
  var csvRows = [];

  if (currentRegion === 'all') {
    csvRows.push('周期,大区,劳务公司数,原币付款金额(USD),总工时(h),单位工时成本(USD/h)');
    var aggMap = {};
    recs.forEach(function(r) {
      var key = r.period + '||' + r.region;
      if (!aggMap[key]) aggMap[key] = { period: r.period, region: r.region, vendors: {}, payment: 0, hours: 0 };
      aggMap[key].vendors[r.vendor] = true;
      aggMap[key].payment += r.payment;
      aggMap[key].hours += r.hours;
    });
    Object.values(aggMap).sort(function(a,b) { return b.period.localeCompare(a.period) || a.region.localeCompare(b.region); }).forEach(function(d) {
      var unitCost = d.hours > 0 ? (d.payment / d.hours).toFixed(2) : '0.00';
      csvRows.push([d.period, d.region, Object.keys(d.vendors).length, d.payment.toFixed(2), d.hours.toFixed(2), unitCost].join(','));
    });
  } else {
    csvRows.push('周期,大区,劳务公司,原币付款金额(USD),总工时(h),单位工时成本(USD/h)');
    var aggMap2 = {};
    recs.forEach(function(r) {
      var key = r.period + '||' + r.vendor;
      if (!aggMap2[key]) aggMap2[key] = { period: r.period, region: r.region, vendor: r.vendor, payment: 0, hours: 0 };
      aggMap2[key].payment += r.payment;
      aggMap2[key].hours += r.hours;
    });
    Object.values(aggMap2).sort(function(a,b) { return b.period.localeCompare(a.period) || a.vendor.localeCompare(b.vendor); }).forEach(function(d) {
      var unitCost = d.hours > 0 ? (d.payment / d.hours).toFixed(2) : '0.00';
      csvRows.push([d.period, d.region, '"' + d.vendor + '"', d.payment.toFixed(2), d.hours.toFixed(2), unitCost].join(','));
    });
  }

  var blob = new Blob([BOM + csvRows.join('\n')], {type:'text/csv;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '劳务付款明细_' + (currentRegion==='all'?'全部':currentRegion) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ==================== REGION SELECT ====================
function selectRegion(region) {
  currentRegion = region;
  document.querySelectorAll('.region-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.region === region);
  });
  refreshAll();
}

// ==================== REFRESH ALL ====================
function refreshAll() {
  currentPeriod = document.getElementById('periodFilter').value;
  renderKPI();
  renderTrend();
  renderRegionCompare();
  renderVendorRank();
  renderTable();
  var lastPeriod = PERIODS[PERIODS.length-1];
  if (lastPeriod) {
    document.getElementById('updateTime').textContent = '数据截至：' + lastPeriod;
  }
}
